<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClockedIn - Login</title>
  <link rel="stylesheet" href="https://use.typekit.net/kxt6usx.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="login-wrapper">
    <img src="svgs/kreisoben.svg" class="bg-shape bg-top" alt="">
    <img src="svgs/kreisunten.svg" class="bg-shape bg-bottom" alt="">

    <div class="main-content">
      <div class="logo-area">
        <img src="svgs/Logo.svg" class="main-logo" alt="ClockedIn Logo">
      </div>

      <h1 class="login-headline">LoGiN</h1>

      <form class="login-form" id="loginForm">
        <div class="input-container">
          <input type="email" id="email" placeholder="E-Mail" required>
        </div>
        <div class="input-container">
          <input type="password" id="password" placeholder="Passwort" required>
        </div>

        <button type="submit" class="submit-btn">LoGiN</button>
      </form>

      <p class="register-text">
        Don’t have an account? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <script src="js/api-config.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
