<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neues Benutzerprofil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Tokens ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0f0e0d;
      --paper:    #f5f0e8;
      --card:     #fffdf8;
      --accent:   #c0392b;
      --muted:    #8a8070;
      --border:   #ddd5c5;
      --success:  #2d6a4f;
      --error:    var(--accent);
      --radius:   4px;
      --shadow:   0 8px 40px rgba(15,14,13,.10);
    }

    html, body {
      min-height: 100%;
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }

    /* ── Background texture ─────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a09080' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* minimal styles for invalid & toast */
    .invalid { outline: 2px solid var(--error); }
    #toast { display: none; padding: 10px 14px; border-radius: 6px; margin-top: 14px; }
    #toast.success { background: var(--success); color: white; }
    #toast.error { background: var(--error); color: white; }
    .btn-submit.loading .spinner { display: inline-block; }
    .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.12); border-top-color: rgba(0,0,0,0.4); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

</head>
<body>
<main>
  <div class="card">

    <div class="card-head">
      <h1>Neues <em>Benutzerprofil</em></h1>
      <p>Felder ausfüllen und speichern – das Profil wird direkt in der Datenbank angelegt.</p>
    </div>

    <div class="card-body">
      <!-- Formular: submit statt onclick / globaler Enter-Handler -->
      <form id="newUserForm" novalidate>
        <div class="row-2">
          <div class="field">
            <label for="firstname">Vorname</label>
            <input type="text" id="firstname" name="firstname" placeholder="Max" autocomplete="given-name" />
          </div>
          <div class="field">
            <label for="lastname">Nachname</label>
            <input type="text" id="lastname" name="lastname" placeholder="Muster" autocomplete="family-name" />
          </div>
        </div>

        <div class="row-2">
          <div class="field">
            <label for="rolle">Rolle</label>
            <select id="rolle" name="rolle">
              <option value="">— bitte wählen —</option>
              <option value="Admin">Admin</option>
              <option value="Ausleihe">Ausleihe</option>
            </select>
          </div>
          <div class="field">
            <label for="ort">Ort</label>
            <select id="ort" name="ort">
              <option value="">— bitte wählen —</option>
              <option value="Bern">Bern</option>
              <option value="Chur">Chur</option>
              <option value="Zürich">Zürich</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="email">E-Mail</label>
          <input type="email" id="email" name="email" placeholder="max@example.ch" autocomplete="email" />
        </div>

        <div class="row-2">
          <div class="field">
            <label for="passwort">Passwort <span style="color:var(--muted);font-size:.7rem;text-transform:none;letter-spacing:0">(min. 8 Zeichen)</span></label>
            <input type="password" id="passwort" name="passwort" placeholder="••••••••" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="card_id">Karten-ID</label>
            <input type="text" id="card_id" name="card_id" placeholder="z.B. A3F92C" />
          </div>
        </div>

        <button class="btn-submit" id="submitBtn" type="submit">
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-text">Profil erstellen</span>
        </button>

        <div id="toast" role="status" aria-live="polite"></div>
      </form>
    </div>
  </div>
</main>

<script src="js/api-config.js"></script>
<script>
  // helper Toast
  let toastTimer = null;
  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.className = ''; // reset classes
    t.classList.add(type);
    t.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      t.style.display = 'none';
      t.className = '';
    }, 5000);
  }

  async function submitForm() {
    const btn   = document.getElementById('submitBtn');
    const felder = ['firstname','lastname','rolle','ort','email','passwort','card_id'];

    // Defensive: ensure button exists
    if (!btn) return;

    // Validierung
    let ok = true;
    felder.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return; // falls Element fehlt, nicht crashen
      el.classList.remove('invalid');
      if (!String(el.value || '').trim()) { el.classList.add('invalid'); ok = false; }
    });

    const emailEl = document.getElementById('email');
    if (emailEl && emailEl.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
      emailEl.classList.add('invalid'); ok = false;
    }

    const pwEl = document.getElementById('passwort');
    if (pwEl && pwEl.value && pwEl.value.length < 8) {
      pwEl.classList.add('invalid'); ok = false;
    }

    if (!ok) {
      showToast('Bitte alle Felder korrekt ausfüllen.', 'error');
      return;
    }

    // API-Konfiguration prüfen
    if (typeof apiUrl !== 'function') {
      showToast('Fehler: API-Konfiguration fehlt. js/api-config.js prüfen.', 'error');
      return;
    }

    // Submit
    btn.disabled = true;
    btn.classList.add('loading');

    const body = new FormData();
    felder.forEach(id => {
      const el = document.getElementById(id);
      body.append(id, el ? (el.value || '') : '');
    });

    try {
      const res = await fetch(apiUrl('api/benutzer_erstellen.php'), { method: 'POST', body, credentials: 'include' });
      const text = await res.text();
      let data = null;
      try {
        data = JSON.parse(text);
      } catch (parseErr) {
        console.error('HTTP', res.status, 'Antwort (kein JSON):', text.slice(0, 500));
        let hint = 'Server-Antwort war kein JSON (oft PHP-Fehler/Warnung vor dem JSON). Browser-Konsole prüfen.';
        if (res.status === 404) {
          hint = 'api/benutzer_erstellen.php nicht gefunden — alle Ordner (api/, system/) hochladen, Groß-/Kleinschreibung beachten.';
        } else if (location.protocol === 'file:') {
          hint = 'Seite per file:// geöffnet — über https://… auf dem Server öffnen, sonst funktioniert fetch() nicht.';
        } else if (!String(window.API_BASE || '').trim() && location.origin) {
          hint += ' Falls die Seite woanders liegt: API_BASE in js/api-config.js setzen.';
        }
        showToast(hint, 'error');
        return;
      }

      if (!res.ok) {
        showToast(data && data.message ? data.message : 'Serverfehler – bitte prüfen.', 'error');
        return;
      }

      if (data && data.success) {
        showToast(data.message || 'Profil erstellt.', 'success');
        felder.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = '';
        });
      } else {
        showToast((data && data.message) ? data.message : 'Fehler beim Erstellen des Profils.', 'error');
      }
    } catch (e) {
      console.error(e);
      showToast('Verbindungsfehler – bitte erneut versuchen.', 'error');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  // Form-Submit statt globaler Enter-Handler
  const form = document.getElementById('newUserForm');
  if (form) {
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      submitForm();
    });
  }
</script>
</body>
</html>
