<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClockedIn - Home</title>
    <link rel="stylesheet" href="https://use.typekit.net/kxt6usx.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- Fix Drag: Overlay-Div darf Pointer-Events nicht abfangen --- */
        .co-circle-content {
            pointer-events: none;
        }

        .co-circle-content .co-time {
            pointer-events: auto;
            /* Inputs bleiben klickbar */
        }

        /* --- Fix Zentrierung: Browser-Defaults der time-Inputs entfernen --- */
        .co-time {
            -webkit-appearance: none;
            -moz-appearance: textfield;
            appearance: none;
            box-sizing: content-box;
        }

        .co-time::-webkit-clear-button,
        .co-time::-webkit-inner-spin-button,
        .co-time::-webkit-calendar-picker-indicator {
            display: none;
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        /* SVG-Punkte: Touch-Drag erlauben */
        #co-dot-from,
        #co-dot-to {
            touch-action: none;
        }
    </style>
</head>

<body>
    <div class="app-container" id="app">

        <header class="main-header">
            <img src="svgs/logo.svg" class="logo" alt="ClockedIn Logo">
            <span class="location-tag">Standort Chur</span>
        </header>

        <section class="welcome-section">
            <h1>Ready,<br>steady?</h1>
            <img src="svgs/smiley.svg" class="smiley" alt="">
        </section>

        <div class="timer-card">
            <img src="svgs/uhrklein.svg" class="timer-uhr" alt="">
            <p class="timer-label" id="timer-label">Lock in!</p>
            <div class="timer-row">
                <div class="timer-col">
                    <span class="timer-display" id="t-hours">00</span>
                    <span class="timer-unit">Stunden</span>
                </div>
                <div class="timer-col">
                    <span class="timer-display" id="t-minutes">00</span>
                    <span class="timer-unit">Minuten</span>
                </div>
                <div class="timer-col">
                    <span class="timer-display" id="t-seconds">00</span>
                    <span class="timer-unit">Sekunden</span>
                </div>
            </div>
        </div>

        <button class="big-beautiful-button" id="btn-clock-in">Clock In</button>

        <div class="info-grid">
            <div class="info-card pink">
                <p>Gesamt heute:</p>
                <h3 id="total-today">0H 30M</h3>
            </div>
            <button class="info-card green">
                <span class="manual-plus">+</span>
                <p>manuell<br>erfassen</p>
            </button>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <img src="svgs/Nav Icons/Home_Icon_Active.svg" class="nav-icon" alt="">
                Home
            </a>
            <a href="stundenuebersicht.html" class="nav-item">
                <img src="svgs/Nav Icons/Uebersicht_Icon_Default.svg" class="nav-icon" alt="">
                Übersicht
            </a>
            <a href="settings.html" class="nav-item">
                <img src="svgs/Nav Icons/Einstellungen_Icon_Default.svg" class="nav-icon" alt="">
                Einstellungen
            </a>
        </nav>

        <!-- Activity Modal (Clock-In) -->
        <div class="activity-overlay" id="activity-overlay">
            <div class="activity-modal">
                <div class="activity-header">
                    <h2>Choose your Hustle</h2>
                    <button class="activity-close" id="activity-close" aria-label="Schließen">×</button>
                </div>

                <div class="activity-grid">
                    <button class="activity-btn" data-activity="Kita">Kita</button>
                    <button class="activity-btn" data-activity="Büro">Büro</button>
                    <button class="activity-btn" data-activity="Meeting">Meeting</button>
                    <button class="activity-btn" data-activity="Cleanup">Cleanup</button>
                </div>

                <button class="big-beautiful-button" id="activity-confirm" disabled>Let's Go</button>
            </div>
        </div>

        <!-- Clock-Out Modal -->
        <div class="clockout-overlay" id="clockout-overlay">
            <div class="clockout-modal">
                <div class="clockout-header">
                    <h2>Aktivität Beenden</h2>
                    <button class="clockout-close" id="clockout-close" aria-label="Schließen">×</button>
                </div>

                <div class="clockout-time">
                    <div class="co-col">
                        <span class="co-val" id="co-hours">00</span>
                        <span class="co-unit">Stunden</span>
                    </div>
                    <div class="co-col">
                        <span class="co-val" id="co-minutes">00</span>
                        <span class="co-unit">Minuten</span>
                    </div>
                    <div class="co-col">
                        <span class="co-val" id="co-seconds">00</span>
                        <span class="co-unit">Sekunden</span>
                    </div>
                </div>

                <div class="clockout-pills">
                    <button class="co-pill" data-activity="Kita">Kita</button>
                    <button class="co-pill" data-activity="Büro">Büro</button>
                    <button class="co-pill" data-activity="Cleanup">Cleanup</button>
                    <button class="co-pill" data-activity="Meeting">Meeting</button>
                </div>

                <div class="clockout-circle-wrap">
                    <svg class="co-ring" id="co-ring" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
                        <!-- weißer Ring -->
                        <circle cx="120" cy="120" r="100" fill="none" stroke="#ffffff" stroke-width="14" />
                        <!-- schwarzer Bogen zwischen von & bis -->
                        <path id="co-arc" d="" fill="none" stroke="#06050a" stroke-width="14" stroke-linecap="round" />
                        <!-- Grüner Punkt (von) -->
                        <circle id="co-dot-from" cx="220" cy="120" r="16" fill="#dbf58a" stroke="#06050a"
                            stroke-width="4" style="cursor:grab; touch-action:none;" />
                        <!-- Pinker Punkt (bis) -->
                        <circle id="co-dot-to" cx="120" cy="220" r="16" fill="#fea3e0" stroke="#06050a" stroke-width="4"
                            style="cursor:grab; touch-action:none;" />
                    </svg>
                    <div class="co-circle-content">
                        <span class="co-label">von</span>
                        <input type="time" class="co-time co-time-from" id="co-from" value="14:30">
                        <span class="co-label">bis</span>
                        <input type="time" class="co-time co-time-to" id="co-to" value="18:15">
                    </div>
                </div>

                <button class="big-beautiful-button" id="clockout-save">Speichern</button>
            </div>
        </div>

    </div>

    <script>
        const app = document.getElementById('app');
        const overlay = document.getElementById('activity-overlay');
        const clockBtn = document.getElementById('btn-clock-in');
        const closeBtn = document.getElementById('activity-close');
        const confirmBtn = document.getElementById('activity-confirm');
        const activityBtns = document.querySelectorAll('.activity-btn');

        const timerLabel = document.getElementById('timer-label');
        const tHours = document.getElementById('t-hours');
        const tMinutes = document.getElementById('t-minutes');
        const tSeconds = document.getElementById('t-seconds');

        // Clock-Out Modal Elemente
        const clockoutOverlay = document.getElementById('clockout-overlay');
        const clockoutClose = document.getElementById('clockout-close');
        const clockoutSave = document.getElementById('clockout-save');
        const coHours = document.getElementById('co-hours');
        const coMinutes = document.getElementById('co-minutes');
        const coSeconds = document.getElementById('co-seconds');
        const coFrom = document.getElementById('co-from');
        const coTo = document.getElementById('co-to');
        const coPills = document.querySelectorAll('.co-pill');

        let selectedActivity = null;
        let timerInterval = null;
        let startTime = null;

        // Clock-In/Out Button
        clockBtn.addEventListener('click', () => {
            if (app.classList.contains('clocked-in')) {
                openClockoutModal();
            } else {
                overlay.classList.add('active');
            }
        });

        // ----- Clock-In Modal -----
        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        function closeModal() {
            overlay.classList.remove('active');
            activityBtns.forEach(b => b.classList.remove('selected'));
            selectedActivity = null;
            confirmBtn.disabled = true;
        }

        activityBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                activityBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedActivity = btn.dataset.activity;
                confirmBtn.disabled = false;
            });
        });

        confirmBtn.addEventListener('click', () => {
            clockIn(selectedActivity);
            closeModal();
        });

        function clockIn(activity) {
            app.classList.add('clocked-in');
            timerLabel.textContent = `${activity} seit`;
            clockBtn.textContent = 'Clock Out';
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
        }

        function clockOut() {
            app.classList.remove('clocked-in');
            clearInterval(timerInterval);
            timerInterval = null;
            timerLabel.textContent = 'Lock in!';
            clockBtn.textContent = 'Clock In';
            tHours.textContent = '00';
            tMinutes.textContent = '00';
            tSeconds.textContent = '00';
            selectedActivity = null;
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const h = Math.floor(elapsed / 3600);
            const m = Math.floor((elapsed % 3600) / 60);
            const s = elapsed % 60;
            tHours.textContent = String(h).padStart(2, '0');
            tMinutes.textContent = String(m).padStart(2, '0');
            tSeconds.textContent = String(s).padStart(2, '0');
        }

        // ----- Clock-Out Modal -----
        function openClockoutModal() {
            // aktuelle Zeiten setzen
            const startDate = new Date(startTime);
            const endDate = new Date();
            coFrom.value = toTimeStr(startDate);
            coTo.value = toTimeStr(endDate);

            // Pille mit aktueller Aktivität vorauswählen
            coPills.forEach(p => {
                p.classList.toggle('selected', p.dataset.activity === selectedActivity);
            });

            recalcClockoutDuration();
            updateCircleVisual();
            clockoutOverlay.classList.add('active');
        }

        function closeClockoutModal() {
            clockoutOverlay.classList.remove('active');
        }

        function toTimeStr(date) {
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function recalcClockoutDuration() {
            if (!coFrom.value || !coTo.value) return;
            const [fh, fm] = coFrom.value.split(':').map(Number);
            const [th, tm] = coTo.value.split(':').map(Number);
            let diff = (th * 60 + tm) - (fh * 60 + fm);
            if (diff < 0) diff += 24 * 60; // über Mitternacht
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            coHours.textContent = String(h).padStart(2, '0');
            coMinutes.textContent = String(m).padStart(2, '0');
            coSeconds.textContent = '00';
        }

        clockoutClose.addEventListener('click', closeClockoutModal);
        clockoutOverlay.addEventListener('click', (e) => {
            if (e.target === clockoutOverlay) closeClockoutModal();
        });

        coPills.forEach(pill => {
            pill.addEventListener('click', () => {
                coPills.forEach(p => p.classList.remove('selected'));
                pill.classList.add('selected');
                selectedActivity = pill.dataset.activity;
                timerLabel.textContent = `${selectedActivity} seit`;
            });
        });

        coFrom.addEventListener('input', () => { recalcClockoutDuration(); updateCircleVisual(); });
        coTo.addEventListener('input', () => { recalcClockoutDuration(); updateCircleVisual(); });

        // ----- Drag-Logik für den Kreis -----
        const coRing = document.getElementById('co-ring');
        const coArc = document.getElementById('co-arc');
        const coDotFrom = document.getElementById('co-dot-from');
        const coDotTo = document.getElementById('co-dot-to');

        const CENTER = 120;
        const RADIUS = 100;
        const SNAP_MIN = 5; // auf 5-Minuten-Schritte einrasten

        // Zeit ↔ Winkel (24h = 360°, 0:00 = oben, im Uhrzeigersinn)
        function timeToAngle(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return ((h * 60 + m) / (24 * 60)) * 360;
        }
        function angleToTime(angle) {
            angle = ((angle % 360) + 360) % 360;
            let totalMin = Math.round((angle / 360) * 24 * 60);
            totalMin = Math.round(totalMin / SNAP_MIN) * SNAP_MIN;
            totalMin = ((totalMin % (24 * 60)) + (24 * 60)) % (24 * 60);
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }
        function angleToPos(angle) {
            const rad = (angle - 90) * Math.PI / 180; // -90: 0° = oben
            return {
                x: CENTER + RADIUS * Math.cos(rad),
                y: CENTER + RADIUS * Math.sin(rad)
            };
        }

        // SVG-Pfad für den schwarzen Bogen von fromAngle → toAngle (clockwise)
        function describeArc(fromAngle, toAngle) {
            const from = angleToPos(fromAngle);
            const to = angleToPos(toAngle);
            let sweep = toAngle - fromAngle;
            sweep = ((sweep % 360) + 360) % 360;
            const largeArc = sweep > 180 ? 1 : 0;
            return `M ${from.x} ${from.y} A ${RADIUS} ${RADIUS} 0 ${largeArc} 1 ${to.x} ${to.y}`;
        }

        // Kreis & Bogen anhand der aktuellen Inputs neu zeichnen
        function updateCircleVisual() {
            if (!coFrom.value || !coTo.value) return;
            const aFrom = timeToAngle(coFrom.value);
            const aTo = timeToAngle(coTo.value);
            const pFrom = angleToPos(aFrom);
            const pTo = angleToPos(aTo);
            coDotFrom.setAttribute('cx', pFrom.x);
            coDotFrom.setAttribute('cy', pFrom.y);
            coDotTo.setAttribute('cx', pTo.x);
            coDotTo.setAttribute('cy', pTo.y);
            coArc.setAttribute('d', describeArc(aFrom, aTo));
        }

        // Bildschirm-Koordinaten → SVG-Koordinaten
        function clientToSvg(clientX, clientY) {
            const pt = coRing.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            return pt.matrixTransform(coRing.getScreenCTM().inverse());
        }

        // Punkt → Winkel (0° = oben, im Uhrzeigersinn)
        function posToAngle(x, y) {
            const dx = x - CENTER;
            const dy = y - CENTER;
            let deg = Math.atan2(dy, dx) * 180 / Math.PI + 90;
            if (deg < 0) deg += 360;
            return deg;
        }

        function setupDrag(dot, target /* 'from' | 'to' */) {
            let dragging = false;

            const onMove = (e) => {
                if (!dragging) return;
                e.preventDefault();
                const { x, y } = clientToSvg(e.clientX, e.clientY);
                const angle = posToAngle(x, y);
                const time = angleToTime(angle);
                if (target === 'from') coFrom.value = time;
                else coTo.value = time;
                updateCircleVisual();
                recalcClockoutDuration();
            };

            const onUp = (e) => {
                if (!dragging) return;
                dragging = false;
                dot.style.cursor = 'grab';
                try { dot.releasePointerCapture(e.pointerId); } catch (_) { }
            };

            dot.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                dragging = true;
                dot.style.cursor = 'grabbing';
                try { dot.setPointerCapture(e.pointerId); } catch (_) { }
            });
            dot.addEventListener('pointermove', onMove);
            dot.addEventListener('pointerup', onUp);
            dot.addEventListener('pointercancel', onUp);
        }

        setupDrag(coDotFrom, 'from');
        setupDrag(coDotTo, 'to');

        clockoutSave.addEventListener('click', () => {
            // Hier könntest du den Eintrag speichern (z.B. in localStorage / API)
            // const entry = {
            //     activity: selectedActivity,
            //     from: coFrom.value,
            //     to: coTo.value,
            //     hours: coHours.textContent,
            //     minutes: coMinutes.textContent
            // };
            closeClockoutModal();
            clockOut();
        });
    </script>
</body>

</html>
