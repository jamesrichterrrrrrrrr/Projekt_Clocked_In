<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClockedIn - Home</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/kxt6usx.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">CLOCKED IN</div>
            <div class="location-tag">Standort Chur</div>
        </header>

        <section class="welcome-section">
            <h1>Ready,<br>Captain?</h1>
        </section>

        <div class="timer-card">
            <div class="placeholder-circle"></div>
            <p class="timer-label">Lock in!</p>
            <div class="timer-display">00 00 00</div>
            <div class="timer-units">
                <span>Stunden</span>
                <span>Minuten</span>
                <span>Sekunden</span>
            </div>
        </div>

        <button class="btn-clock-in">CLOCK IN</button>

        <div class="info-grid">
            <div class="info-card pink">
                <p>Gesamt heute:</p>
                <h3>0H 30M</h3>
            </div>
            <div class="info-card green">
                <div class="plus-icon" style="font-size: 2rem;">+</div>
                <p>manuell erfassen</p>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <div class="nav-icon"></div>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-icon"></div>
                <span>Übersicht</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-icon"></div>
                <span>Admin</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-icon"></div>
                <span>Settings</span>
            </a>
        </nav>
    </div>
</body>
</html>
