<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://use.typekit.net/kxt6usx.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="welcome-page">

    <img src="svgs/logo.svg" class="logo" alt="Clocked In">

    <img src="svgs/uhr.svg" class="biguhr" alt="">

    <div class="welcome-bottom">
        <h1>take a<br>deep breath</h1>
        <button id="btn-clock-in">let's clock</button>
    </div>

    <!-- Redirect on button click -->
    <script>
      const btn = document.getElementById('btn-clock-in');
      if (btn) {
        btn.addEventListener('click', () => {
          window.location.href = 'login.html';
        });
      }
    </script>

</body>
